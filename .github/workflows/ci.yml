name: CI
on: [push, pull_request]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true
          run-install: false
      - run: vp install --frozen-lockfile
      - run: vp check
      - run: vp run typecheck
      - run: vp test
      - run: vp run build
      - run: vp run smoke
      - name: Ensure committed bundle is up to date
        run: git diff --exit-code -- mcp-server/dist
