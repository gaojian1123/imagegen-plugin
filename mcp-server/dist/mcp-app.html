<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>imagegen</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: var(--font-sans, system-ui, sans-serif);
        color: var(--color-text-primary, inherit);
        background: transparent;
      }
      #app {
        padding: 8px;
      }
      .status {
        padding: 8px 4px;
        color: var(--color-text-secondary, #666);
        font-size: 14px;
      }
      .gallery {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .card {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .img {
        max-width: 100%;
        height: auto;
        border-radius: var(--border-radius-md, 8px);
        background: var(--color-background-secondary, #f3f3f3);
      }
      .bar {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .save {
        border: 0;
        cursor: pointer;
        padding: 4px 12px;
        border-radius: var(--border-radius-md, 8px);
        background: var(--color-background-accent, #2563eb);
        color: #fff;
        font-size: 13px;
      }
      .meta,
      .rp {
        font-size: 12px;
        color: var(--color-text-secondary, #666);
        word-break: break-all;
      }
    </style>
